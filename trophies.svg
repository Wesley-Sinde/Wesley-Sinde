<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card { fill: #1a1b27; stroke: #2d1b4e; stroke-width: 1.5; rx: 10; }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #a78bfa; font-weight: 600; letter-spacing: 0.5px; }
      .value { font-family: 'JetBrains Mono', monospace; font-size: 22px; fill: #ffffff; font-weight: 700; }
      .rank { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #ff6b6b; font-weight: 700; }
      .icon { font-size: 26px; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#16172220"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="#0d0221" rx="12"/>

  <!-- Row of 6 trophy cards -->
  <!-- Card 1: Years Experience (clock icon) -->
  <g transform="translate(20,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <circle cx="65" cy="38" r="16" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <line x1="65" y1="38" x2="65" y2="27" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="65" y1="38" x2="73" y2="42" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round"/>
    <text x="65" y="80" text-anchor="middle" class="title">EXPERIENCE</text>
    <text x="65" y="112" text-anchor="middle" class="value">5+</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">YEARS</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SSS</text>
  </g>

  <!-- Card 2: Projects (box icon) -->
  <g transform="translate(160,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <rect x="51" y="26" width="28" height="22" rx="2" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <line x1="51" y1="34" x2="79" y2="34" stroke="#c084fc" stroke-width="2"/>
    <text x="65" y="80" text-anchor="middle" class="title">PROJECTS</text>
    <text x="65" y="112" text-anchor="middle" class="value">50+</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">DELIVERED</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SSS</text>
  </g>

  <!-- Card 3: Clients (handshake / two circles) -->
  <g transform="translate(300,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <circle cx="56" cy="36" r="9" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <circle cx="74" cy="36" r="9" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <text x="65" y="80" text-anchor="middle" class="title">CLIENTS</text>
    <text x="65" y="112" text-anchor="middle" class="value">40+</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">SERVED</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SS</text>
  </g>

  <!-- Card 4: Satisfaction (star icon) -->
  <g transform="translate(440,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <path d="M65,22 L70,33 L82,34 L73,42 L76,54 L65,47 L54,54 L57,42 L48,34 L60,33 Z" fill="#c084fc"/>
    <text x="65" y="80" text-anchor="middle" class="title">SATISFACTION</text>
    <text x="65" y="112" text-anchor="middle" class="value">98%</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">RATING</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SSS</text>
  </g>

  <!-- Card 5: Stack (layers icon) -->
  <g transform="translate(580,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <polygon points="65,22 84,32 65,42 46,32" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <polyline points="46,40 65,50 84,40" fill="none" stroke="#c084fc" stroke-width="2.5"/>
    <text x="65" y="80" text-anchor="middle" class="title">TECH STACK</text>
    <text x="65" y="112" text-anchor="middle" class="value">15+</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">LANGUAGES</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SS</text>
  </g>

  <!-- Card 6: Founder (trophy icon) -->
  <g transform="translate(720,20)">
    <rect width="130" height="180" class="card" fill="url(#bg)"/>
    <path d="M56,24 h18 v14 a9,9 0 0 1 -18,0 Z" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
    <path d="M56,27 h-7 a2,2 0 0 0 -2,2 v2 a7,7 0 0 0 7,7" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <path d="M74,27 h7 a2,2 0 0 1 2,2 v2 a7,7 0 0 1 -7,7" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <line x1="65" y1="47" x2="65" y2="52" stroke="#ff6b6b" stroke-width="2.5"/>
    <line x1="58" y1="52" x2="72" y2="52" stroke="#ff6b6b" stroke-width="2.5"/>
    <text x="65" y="80" text-anchor="middle" class="title">PRIDETECH</text>
    <text x="65" y="112" text-anchor="middle" class="value">2024</text>
    <text x="65" y="132" text-anchor="middle" class="title" font-size="10">FOUNDED</text>
    <text x="65" y="160" text-anchor="middle" class="rank">SECRET</text>
  </g>
</svg>
